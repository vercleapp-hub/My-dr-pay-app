<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDoctor Pay | منظومة الدفع والتحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #FF5722; --dark: #0a0a0a; --card: #161616; --text: #e0e0e0; --success: #4CAF50; --error: #f44336; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--dark); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .navbar { width: 100%; padding: 15px; background: var(--card); text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .navbar img { width: 50px; }
        .container { max-width: 450px; width: 92%; margin: 20px 0; background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border: 1px solid #222; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; color: #fff; }
        .form-group { margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #222; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .error-box { background: rgba(244,67,54,0.15); border-right: 4px solid var(--error); color: #ff8a80; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; font-size: 0.9rem; line-height: 1.4; }
        .status-badge { font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; margin-top: 8px; display: inline-block; }
        .status-online { background: rgba(76,175,80,0.1); color: var(--success); }
        .status-offline { background: rgba(244,67,54,0.1); color: var(--error); }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-btn { background: #333; margin: 5px; width: auto; padding: 10px 20px; font-size: 0.85rem; }
        .tab-active { background: var(--primary); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 200;">جاري الاتصال بالسحابة...</p>
    </div>

    <div class="navbar">
        <img src="logo/logo.png" alt="Logo">
        <div style="font-weight: bold; font-size: 1.1rem;">ELDoctor <span style="color: var(--primary);">Pay</span></div>
        <div id="db-indicator" class="status-badge status-offline">جاري فحص الاتصال...</div>
    </div>

    <!-- واجهة تسجيل الدخول -->
    <div id="login-section" class="container">
        <h1>دخول آمن</h1>
        <div class="form-group">
            <input type="tel" id="login-phone" placeholder="رقم الهاتف (11 رقم)">
        </div>
        <div class="form-group">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
        </div>
        <button id="btn-login" onclick="handleLogin()">دخول للمنظومة</button>

        <div id="login-error" class="error-box"></div>

        <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888;">
            ليس لديك حساب؟ <span style="color: var(--primary); cursor:pointer; font-weight: bold;" onclick="showSignup()">أنشئ حسابك الآن</span>
        </div>
    </div>

    <!-- واجهة إنشاء الحساب -->
    <div id="signup-section" class="container" style="display: none;">
        <h1>انضمام كتاجر جديد</h1>
        <div id="step-1">
            <input type="text" id="reg-nid" placeholder="الرقم القومي (14 رقم)" maxlength="14">
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف" style="margin-top: 15px;">
            <button onclick="checkEligibility()" style="margin-top: 20px;">التحقق والمتابعة</button>
        </div>
        <div id="signup-error" class="error-box"></div>
        <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888;" onclick="showLogin()">
            لديك حساب بالفعل؟ <span style="color: var(--primary); cursor:pointer; font-weight: bold;">تسجيل الدخول</span>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseUrl = 'https://wwkllpornhzwovsvyikv.supabase.co';
        const supabaseKey = 'sb_publishable_QcDiCoyD921ZNJ-pBd_KKw_LgQzeIpU';
        const client = createClient(supabaseUrl, supabaseKey);

        // 1. فحص الاتصال التلقائي وتصحيح الحالة
        async function initSystem() {
            const indicator = document.getElementById('db-indicator');
            try {
                const { data, error } = await client.from('profiles').select('count', { count: 'exact', head: true });
                if (error && error.code !== 'PGRST116') throw error;
                indicator.innerText = "🟢 السيرفر متصل";
                indicator.className = "status-badge status-online";
                console.log("System Ready: Connected to Supabase");
            } catch (err) {
                indicator.innerText = "🔴 خطأ في الاتصال";
                indicator.className = "status-badge status-offline";
                console.error("Connection Failed:", err.message);
            }
        }
        initSystem();

        function showSignup() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value;
            const errorBox = document.getElementById('login-error');

            errorBox.style.display = 'none';

            if (!phone || !pass) {
                errorBox.innerText = "⚠️ يرجى إدخال البيانات المطلوبة كاملة";
                errorBox.style.display = 'block';
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                const cleanPhone = phone.replace(/[^0-9]/g, '');
                const { data: auth, error: aErr } = await client.auth.signInWithPassword({
                    email: `${cleanPhone}@drpay.app`,
                    password: pass
                });

                if (aErr) {
                    let msg = "خطأ في الدخول";
                    if (aErr.message.includes("Invalid login")) msg = "عذراً، رقم الهاتف أو كلمة المرور غير صحيحة";
                    else if (aErr.message.includes("network")) msg = "تأكد من اتصالك بالإنترنت وحاول مجدداً";
                    throw new Error(msg);
                }

                // جلب البروفايل للتحقق من الحالة
                const { data: prof, error: pErr } = await client.from('profiles').select('*').eq('id', auth.user.id).single();

                if (pErr || !prof) throw new Error("لم يتم العثور على بروفايل مرتبط. تواصل مع الإدارة.");

                if (!prof.is_active && prof.role !== 'admin') {
                    await client.auth.signOut();
                    throw new Error("🔒 حسابك قيد المراجعة. سيتم إرسال رسالة تفعيل قريباً.");
                }

                alert("✅ تم تسجيل الدخول بنجاح! أهلاً بك " + prof.full_name);
                // توجيه للوحة التحكم
                if(prof.role === 'admin') location.reload();

            } catch (err) {
                errorBox.innerText = "⚠️ " + err.message;
                errorBox.style.display = 'block';
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        async function checkEligibility() {
            const nid = document.getElementById('reg-nid').value;
            const phone = document.getElementById('reg-phone').value;
            const errorBox = document.getElementById('signup-error');
            errorBox.style.display = 'none';

            if (nid.length !== 14 || phone.length < 11) {
                errorBox.innerText = "⚠️ يرجى التأكد من كتابة الرقم القومي (14 رقم) والهاتف بشكل صحيح";
                errorBox.style.display = 'block';
                return;
            }

            alert("سيتم نقلك لمرحلة استكمال البيانات...");
        }
    </script>
</body>
</html>
