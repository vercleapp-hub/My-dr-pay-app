<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELDoctor Pay - الـدكتور باي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 15px;
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #FF5722; font-size: 2.5rem; }
        p { color: #bbb; font-size: 1.2rem; }
        .status {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border-radius: 20px;
            margin-top: 20px;
        }
        .footer { margin-top: 50px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo/logo.png" alt="ELDoctor Pay" style="width: 150px;">
        <h1>الـدكتور باي - ELDoctor Pay</h1>
        <p>نظام الدفع الإلكتروني المتكامل</p>
        <div class="status">النظام متصل بالسحاب 🌐</div>
        <p style="margin-top: 30px;">تطبيـق الأندرويد مرتبط بنجاح مع Supabase</p>
    </div>
    <div class="footer">
        © 2025 ELDoctor Pay Developer - تم النشر عبر Vercel
    </div>
</body>
</html>
