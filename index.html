<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELDoctor Pay | منظومة الدفع المتكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF5722;
            --primary-dark: #e64a19;
            --dark: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff5252;
            --success: #4caf50;
            --accent: #2196f3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--dark); color: var(--text); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container {
            width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 28px;
            border: 1px solid #333; display: none; margin: 20px; animation: fadeInUp 0.4s ease-out;
        }
        .visible { display: block !important; }

        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area img { width: 80px; filter: drop-shadow(0 0 8px var(--primary)); }

        input, select {
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 16px;
            border: 2px solid #333; background: #111; color: white; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); outline: none; }

        button {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none;
            border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        button:hover { background: var(--primary-dark); }

        /* Wallet & Grid */
        .wallet-card {
            background: linear-gradient(135deg, var(--primary), #ff7043);
            padding: 25px; border-radius: 24px; text-align: right; margin-bottom: 20px;
        }
        .balance { font-size: 2.5rem; font-weight: 900; margin: 5px 0; }

        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .service-item {
            background: #252525; padding: 15px 5px; border-radius: 18px; text-align: center;
            cursor: pointer; border: 1px solid #333; transition: 0.3s;
        }
        .service-item:hover { border-color: var(--primary); transform: translateY(-3px); }
        .service-item i { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; display: block; }
        .service-item span { font-size: 0.8rem; font-weight: 600; }

        /* History */
        .hist-item {
            background: #222; padding: 12px; border-radius: 15px; margin-bottom: 10px;
            border-right: 4px solid var(--success); font-size: 0.85rem;
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 25px; border-radius: 50px; color: white; z-index: 11000; display: none;
        }

        #bodyloader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="bodyloader"><div class="spinner"></div></div>

    <!-- مؤشر حالة الاتصال -->
    <div id="db-status" style="position:fixed; top:10px; right:10px; z-index:12000; font-size:0.7rem; background:rgba(0,0,0,0.6); padding:5px 12px; border-radius:20px; display:flex; align-items:center; gap:6px; border:1px solid #333;">
        <div id="status-dot" style="width:8px; height:8px; background:#ffc107; border-radius:50%;"></div>
        <span id="status-text">جاري فحص الاتصال...</span>
    </div>

    <!-- Login -->
    <div id="view-login" class="container">
        <div class="logo-area">
            <img src="logo/logo.png" alt="Logo">
            <h2>ELDoctor Pay</h2>
            <p>بوابة الدفع الإلكتروني</p>
        </div>
        <input type="tel" id="login-phone" placeholder="رقم الهاتف">
        <input type="password" id="login-pass" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول آمن</button>
        <p style="text-align:center; margin-top:20px; color:var(--text-dim);">
            ليس لديك حساب؟ <b style="color:var(--primary); cursor:pointer" onclick="showView('view-signup')">سجل الآن</b>
        </p>
    </div>

    <!-- Signup -->
    <div id="view-signup" class="container">
        <div class="logo-area"><h3>حساب جديد</h3></div>
        <input type="text" id="reg-name" placeholder="الاسم بالكامل">
        <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
        <input type="text" id="reg-nid" placeholder="الرقم القومي (14 رقم)">
        <input type="password" id="reg-pass" placeholder="كلمة المرور">
        <button onclick="handleSignup()">إرسال طلب الانضمام</button>
        <button style="background:none; color:var(--text-dim); margin-top:10px;" onclick="showView('view-login')">رجوع للدخول</button>
    </div>

    <!-- Dashboard -->
    <div id="view-dash" class="container">
        <div class="wallet-card">
            <div id="user-display-name" style="font-size:0.9rem;">...</div>
            <div class="balance" id="user-balance">0.00</div>
            <div style="font-size:0.8rem; opacity:0.8;">جنيـه مصـري</div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button onclick="showView('view-deposit')" style="background:#333; flex:1; font-size:0.9rem;">💸 شحن رصيد</button>
            <button onclick="logout()" style="background:#333; width:60px;"><i class="fa fa-sign-out-alt"></i></button>
        </div>

        <div class="services-grid">
            <div class="service-item" onclick="openService('voda')"><i class="fa fa-mobile-alt"></i><span>فودافون</span></div>
            <div class="service-item" onclick="openService('etisalat')"><i class="fa fa-mobile-alt"></i><span>اتصالات</span></div>
            <div class="service-item" onclick="openService('orange')"><i class="fa fa-mobile-alt"></i><span>أورانج</span></div>
            <div class="service-item" onclick="openService('we')"><i class="fa fa-mobile-alt"></i><span>وي</span></div>
            <div class="service-item" onclick="openService('elec')"><i class="fa fa-bolt"></i><span>كهرباء</span></div>
            <div class="service-item" onclick="openService('water')"><i class="fa fa-tint"></i><span>مياه</span></div>
        </div>

        <h4 style="margin:25px 0 10px;">أحدث العمليات</h4>
        <div id="transactions-list"></div>
    </div>

    <!-- Payment View -->
    <div id="view-pay" class="container">
        <h3 id="pay-title" style="color:var(--primary)">...</h3>
        <input type="tel" id="pay-target" placeholder="الرقم">
        <input type="number" id="pay-amount" placeholder="المبلغ">
        <button onclick="executePay()">تأكيد العملية</button>
        <button style="background:none; color:var(--text-dim); margin-top:10px" onclick="showView('view-dash')">إلغاء</button>
    </div>

    <!-- Deposit View -->
    <div id="view-deposit" class="container">
        <h3>طلب شحن رصيد</h3>
        <select id="dep-method">
            <option value="InstaPay">InstaPay</option>
            <option value="Vodafone Cash">Vodafone Cash</option>
        </select>
        <input type="number" id="dep-amount" placeholder="المبلغ">
        <button onclick="submitDeposit()">إرسال الطلب</button>
        <button style="background:none; color:var(--text-dim); margin-top:10px" onclick="showView('view-dash')">رجوع</button>
    </div>

    <script type="module">
        import Utils from './utils.js';
        const { createClient } = supabase;
        const _client = createClient('https://wwkllpornhzwovsvyikv.supabase.co', 'sb_publishable_QcDiCoyD921ZNJ-pBd_KKw_LgQzeIpU');

        window.notify = (msg, type='success') => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.background = type==='success'?'var(--success)':'var(--error)';
            t.style.display='block'; setTimeout(()=>t.style.display='none', 3000);
        };

        window.showView = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('visible'));
            document.getElementById(id).classList.add('visible');
            document.getElementById('bodyloader').style.display='none';
        };

        window.handleLogin = async () => {
            const p = document.getElementById('login-phone').value, s = document.getElementById('login-pass').value;
            if(!p || !s) return notify("أدخل البيانات", "error");
            document.getElementById('bodyloader').style.display='flex';
            const { data, error } = await _client.auth.signInWithPassword({ email: `${p}@drpay.app`, password: s });
            if(error) { notify(error.message, "error"); document.getElementById('bodyloader').style.display='none'; }
            else loadProfile(data.user.id);
        };

        async function loadProfile(uid) {
            const { data: user, error } = await _client.from('users').select('*, roles(name)').eq('id', uid).single();
            if(user.status !== 'active') { notify("🔒 الحساب غير نشط (بانتظار التفعيل)", "error"); await _client.auth.signOut(); return; }

            // جلب الرصيد باستخدام الدالة الجديدة
            const { data: balance } = await _client.rpc('get_user_balance', { user_uuid: uid });

            document.getElementById('user-display-name').innerText = "التاجر: " + user.name;
            document.getElementById('user-balance').innerText = parseFloat(balance).toFixed(2);
            showView('view-dash'); loadTransactions(uid);
        }

        window.loadTransactions = async (uid) => {
            const { data } = await _client.from('transactions').select('*').eq('user_id', uid).order('created_at', {ascending:false}).limit(5);
            const list = document.getElementById('transactions-list');
            list.innerHTML = data && data.length ? data.map(t => `
                <div class="hist-item" style="border-right-color: ${t.type==='deposit'?'var(--accent)':'var(--success)'}">
                    <div style="display:flex; justify-content:space-between;"><b>${t.type==='deposit'?'إيداع':'دفع'}</b> <span>${t.amount} ج.م</span></div>
                    <div style="font-size:0.7rem; color:var(--text-dim); margin-top:5px;">${new Date(t.created_at).toLocaleString('ar-EG')}</div>
                    <div style="font-size:0.6rem; opacity:0.6;">رصيد بعد: ${t.balance_after}</div>
                </div>
            `).join('') : '<p style="text-align:center; font-size:0.8rem; color:var(--text-dim);">لا توجد عمليات</p>';
        };

        window.handleSignup = async () => {
            const p = document.getElementById('reg-phone').value, s = document.getElementById('reg-pass').value, n = document.getElementById('reg-name').value;
            if(!p || !s || !n) return notify("أكمل البيانات", "error");
            document.getElementById('bodyloader').style.display='flex';

            // إنشاء الحساب في Auth
            const { data, error } = await _client.auth.signUp({ email: `${p}@drpay.app`, password: s });
            if(error) { notify(error.message, "error"); document.getElementById('bodyloader').style.display='none'; return; }

            // إضافة البيانات في جدول users مع ربطه بـ Role 2 (Merchant)
            await _client.from('users').insert({
                id: data.user.id,
                name: n,
                phone: p,
                status: 'pending',
                role_id: 2
            });
            notify("✅ تم الإرسال! بانتظار التفعيل"); setTimeout(()=>location.reload(), 3000);
        };

        window.openService = (type) => {
            window.currentService = type;
            document.getElementById('pay-title').innerText = "شحن " + type;
            showView('view-pay');
        };

        window.executePay = async () => {
            const t = document.getElementById('pay-target').value, a = parseFloat(document.getElementById('pay-amount').value);
            if(!t || !a) return notify("بيانات ناقصة", "error");
            document.getElementById('bodyloader').style.display='flex';
            const { error } = await _client.rpc('execute_payment_v2', { u_id: (await _client.auth.getUser()).data.user.id, srv_type: window.currentService, amt: a, target_num: t });
            if(error) notify(error.message, "error");
            else { notify("✅ تم بنجاح"); loadProfile((await _client.auth.getUser()).data.user.id); }
            document.getElementById('bodyloader').style.display='none';
        };

        window.submitDeposit = async () => {
            const a = document.getElementById('dep-amount').value, m = document.getElementById('dep-method').value;
            if(!a) return notify("أدخل المبلغ", "error");
            await _client.from('deposits').insert({ user_id: (await _client.auth.getUser()).data.user.id, amount: parseFloat(a), method: m, status: 'pending' });
            notify("✅ تم الإرسال"); showView('view-dash');
        };

        window.logout = async () => { await _client.auth.signOut(); location.reload(); };

        // مراقبة حالة الاتصال بقاعدة البيانات
        const checkDBConnection = async () => {
            try {
                const { data, error } = await _client.from('profiles').select('id').limit(1);
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');

                if (error) throw error;

                dot.style.background = '#4caf50';
                text.innerText = 'متصل بقاعدة البيانات';
            } catch (e) {
                document.getElementById('status-dot').style.background = '#f44336';
                document.getElementById('status-text').innerText = 'فشل الاتصال!';
            }
        };

        window.onload = () => {
            checkDBConnection();
            setInterval(checkDBConnection, 30000); // فحص كل 30 ثانية

            _client.auth.getSession().then(({data}) => {
                if (data.session) loadProfile(data.session.user.id);
                else showView('view-login');
            });
        };
    </script>
</body>
</html>
